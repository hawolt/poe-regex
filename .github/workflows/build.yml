name: Build Project

on:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install dependencies
      run: npm install

    - name: Build the project
      run: npm run build

    - name: Download Map Modifier JSON
      working-directory: ${{ github.workspace }}
      run: curl -L -o map.data.json https://poedb.tw/us/api/MapMods

    - name: Build map.affix.config
      working-directory: ${{ github.workspace }}
      run: jq -r '.data[].Name' map.data.json > frontend/public/data/map.affix.config

    - name: Download org.json dependency
      working-directory: ${{ github.workspace }}
      run: curl -L -o org.json.jar https://repo1.maven.org/maven2/org/json/json/20240303/json-20240303.jar

    - name: Compile Java
      working-directory: ${{ github.workspace }}
      run: javac -cp org.json.jar java/Modifier.java java/Generator.java -d java/out

    - name: Run Generator
      working-directory: ${{ github.workspace }}
      run: java -cp java/out:org.json.jar Generator

    - name: Move output file
      working-directory: ${{ github.workspace }}
      run: mv map.mod.config.json frontend/public/data/map.mod.config.json

    - name: Commit and push all artifacts
      working-directory: ${{ github.workspace }}
      run: |
        git checkout dev
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add frontend/public/bundle.js
        git add frontend/public/data/map.affix.config
        git add frontend/public/data/map.mod.config.json
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Build: update artifacts"
          git push origin dev
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}